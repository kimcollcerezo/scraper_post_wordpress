# locales.yml — Mapping de locales origen → Despertare
# Editar per cada migració. Veure ADR-0010.

version: "1.0"
default_locale: "ca"

mappings:
  - source_locale: null
    target_locale: "ca"
    notes: "Posts sense locale explícit → locale per defecte"
