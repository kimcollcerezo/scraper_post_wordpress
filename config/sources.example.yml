# sources.example.yml — Exemple de configuració de fonts CMS
# Copiar a config/sources.yml i ajustar valors reals.
# IMPORTANT: sources.yml NO ha d'estar versionat si conté URLs privades.

sources:
  wordpress-main:
    type: wordpress
    base_url: https://example.com
    auth:
      type: application_password        # application_password | basic | token | none
      username_env: WORDPRESS_USERNAME
      password_env: WORDPRESS_APPLICATION_PASSWORD
    rate_limit_rps: 1                   # requests per segon
    timeout_seconds: 20
    max_retries: 3
    backoff_factor: 2
    allowed_media_domains:
      - example.com
      - cdn.example.com
    extract:
      post_types:
        - post
        - page
      statuses:
        - publish
      include_drafts: false
      per_page: 20
